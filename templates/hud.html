<div class="portrait-sprite-hud-content">
  {{#if hasMultipleExpressions}}
    <div class="expression-controls">
      <button class="prev-expression" type="button" title="{{localize 'PORTRAIT_SPRITES.HUD.PrevExpression'}}">
        <i class="fas fa-chevron-left"></i>
      </button>
      <div class="expression-label">
        {{localize 'PORTRAIT_SPRITES.HUD.ExpressionLabel' current=currentExpression total=totalExpressions}}
      </div>
      <button class="next-expression" type="button" title="{{localize 'PORTRAIT_SPRITES.HUD.NextExpression'}}">
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>
  {{else}}
    <p>{{localize 'PORTRAIT_SPRITES.HUD.SingleExpression'}}</p>
  {{/if}}
</div>
